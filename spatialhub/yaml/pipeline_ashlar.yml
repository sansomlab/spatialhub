#
# Pipeline pipeline_ashlar.py configuration file
# ==================================================
#

# General options
# ---------------

# Path to project raw data directory, 
# within which we expect one sub-directory per slide (each with sub-directories `Morphology2D` and `flatFiles`). 
# The name of the slide sub-directory must match the (unique) slide_id specified in the samples.tsv file
projDir: /users/sansom/tme871/work/kir032_morrell_cosmx_cancer/shared/cosmx/data/raw/

# Location of the samples.tsv table
# including notably fov to sample conversion information 
# Importantly, the slide_id must match the name of the directory used to save raw Morphology2D data
# (see documentation for details)
sample_table: /users/sansom/tme871/work/kir032_morrell_cosmx_cancer/shared/cosmx/metadata/HNSCC_spatialhub_samples.tsv


# General Ashlar stitching options
# ---------------

# NOTE: default parameters are for a CosMx slide (up-to-date as of February 2025)
ashlar:

    # Pixel to micrometer size factor
    pixel_size: 0.120280945

    # Overlap between adjacent FOV tiles
    tile_overlap: 0.01

    # Comma separated list of FOV channels to keep in 3-channel image saving mode 
    # (useful to open files in Cellpose GUI)
    # Use *numbers* for now (need to add functionality to parse Channel Dictionary)
    # Default PanCk, Membrane, DNA
    keep_channels: 0,2,4

    # < Add option to simplify the transcripts file or not >

