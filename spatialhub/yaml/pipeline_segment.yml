#
# Pipeline pipeline_segment.py configuration file
# ==================================================
#

# General options
# ---------------

# Location of the samples.tsv table
# (see documentation for details)
sample_table: /users/sansom/tme871/work/kir032_morrell_cosmx_cancer/shared/cosmx/metadata/HNSCC_spatialhub_samples.tsv


# 'Master' SpatialData options
# ---------------

# allocated memory
sdata_mem: 16

# path to stitched data directory (dafault to ashlar out directory)
# => shoul include one sub-directory per slide, each containing all sample files for that slide
stitched_dir: ./ashlar.dir/

channels_dict: PanCK,CD68,Membrane,CD45,DNA  # list of image channels in correct order
remove_probes: Neg,Sys,Bac  # list of non-standard probes, to be excluded from transcripts-based segmentation (e.g. Negative, System, bacterial probes...)

# names of essential variables in input transcripts file
probe_key: target
x_coord: x_global_px
y_coord: y_global_px


# Cellpose (using SOPA) segmentation options
# ---------------

run_cellpose: True
cp:
  mem: 4
  cpu: 8
  patch_width: 8000  # patch width should be ~10x cell diameter (in pixels)
  patch_ovlp: 200  # patch overlap shoudl be ~2x cell diameter (in pixels)
  channels: DNA,Membrane  # if used, always set nuclei channel as first
  model: cyto3
  cell_diameter: 60  # essential parameter!
  cell_area: 2000  # minimal area of a polygon for it to be considered as a cell
  flow_thresh: 2
  prob_thresh: -6
  mask_key: cp_cyto3_diam60_area2000